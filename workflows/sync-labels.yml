# label sync workflow

name: Sync labels to all repos

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/labels.yml"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          npm i -g github-label-sync@2
          gh --version

      - name: Sync labels across org (add/update only)
        env:
          GH_TOKEN: ${{ secrets.LABELS_TOKEN }}
          ORG: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          repos=$(gh repo list "$ORG" --limit 1000 --json nameWithOwner -q '.[].nameWithOwner')

          for r in $repos; do
            # Optional: skip the .github repo itself
            if [[ "$r" == "$ORG/.github" ]]; then
              echo "Skipping $r"
              continue
            fi

            echo "---- Syncing labels to $r ----"
            github-label-sync \
              --access-token "$GH_TOKEN" \
              --labels ".github/labels.yml" \
              "$r"
          done
